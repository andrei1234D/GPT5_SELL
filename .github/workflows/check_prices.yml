name: Daily GPT-5 Stock Sell Alert

permissions:
  contents: write
  id-token: write

on:
  schedule:
    - cron: '30 14 * * 1-5'
    - cron: '0,30 15-20 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    env:
      MT_MODELS_BUCKET: gpt5-sell-models-balasandrei-20251221
      GOODSELL_MODELS_PREFIX: models/goodsell
      PEAK_MODELS_PREFIX: models/peak
      QUALITY_MODELS_PREFIX: models/quality
      MODEL_STACK_VERSION: '20260313-bestbaseline-v1'

    steps:
      - name: Checkout repo (no LFS)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          lfs: false

      - name: Set model path env (SELL_MODEL_DIR)
        shell: bash
        run: |
          echo "SELL_MODEL_DIR=${RUNNER_TEMP}/mt_models" >> "$GITHUB_ENV"
          echo "Using SELL_MODEL_DIR=${RUNNER_TEMP}/mt_models"
          echo "PEAK_MODEL_DIR=${RUNNER_TEMP}/peak_models" >> "$GITHUB_ENV"
          echo "QUALITY_MODEL_DIR=${RUNNER_TEMP}/quality_models" >> "$GITHUB_ENV"
          echo "SELL_META_DIR=${RUNNER_TEMP}/mt_models" >> "$GITHUB_ENV"

      - name: Cache Goodsell models
        uses: actions/cache@v3
        with:
          path: ${{ runner.temp }}/mt_models
          key: goodsell-models-${{ env.MODEL_STACK_VERSION }}
      - name: Cache Peak models
        uses: actions/cache@v3
        with:
          path: ${{ runner.temp }}/peak_models
          key: peak-models-${{ env.MODEL_STACK_VERSION }}
      - name: Cache Quality models
        uses: actions/cache@v3
        with:
          path: ${{ runner.temp }}/quality_models
          key: quality-models-${{ env.MODEL_STACK_VERSION }}
      - name: Show GitHub context (for WIF condition)
        shell: bash
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_REPOSITORY_OWNER=${GITHUB_REPOSITORY_OWNER}"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_EVENT_NAME=${GITHUB_EVENT_NAME}"
          echo "GITHUB_ACTOR=${GITHUB_ACTOR}"

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Download Goodsell model artifacts from GCS (if not cached)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${SELL_MODEL_DIR}"

          for f in goodsell_MT-1.joblib goodsell_MT0.joblib goodsell_MT1.joblib goodsell_summary.json; do
            if [ ! -s "${SELL_MODEL_DIR}/${f}" ]; then
              echo "Downloading ${f}..."
              gcloud storage cp \
                "gs://${MT_MODELS_BUCKET}/${GOODSELL_MODELS_PREFIX}/${f}" \
                "${SELL_MODEL_DIR}/${f}"
            else
              echo "Already present: ${f}"
            fi
          done

          echo "=== Goodsell model directory ==="
          ls -lah "${SELL_MODEL_DIR}"

      - name: Download PEAK model artifacts from GCS (if not cached)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PEAK_MODEL_DIR}"
          for f in peak_model_MT-1.json peak_model_MT0.json peak_model_MT1.json peak_model_summary.json; do
            if [ ! -s "${PEAK_MODEL_DIR}/${f}" ]; then
              echo "Downloading ${f}..."
              gcloud storage cp \
                "gs://${MT_MODELS_BUCKET}/${PEAK_MODELS_PREFIX}/${f}" \
                "${PEAK_MODEL_DIR}/${f}"
            else
              echo "Already present: ${f}"
            fi
          done
          echo "=== Peak model directory ==="
          ls -lah "${PEAK_MODEL_DIR}"

      - name: Download QUALITY model artifacts from GCS (if not cached)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${QUALITY_MODEL_DIR}"
          for f in goodsell_quality_MT-1.joblib goodsell_quality_MT0.joblib goodsell_quality_MT1.joblib goodsell_quality_summary.json; do
            if [ ! -s "${QUALITY_MODEL_DIR}/${f}" ]; then
              echo "Downloading ${f}..."
              gcloud storage cp \
                "gs://${MT_MODELS_BUCKET}/${QUALITY_MODELS_PREFIX}/${f}" \
                "${QUALITY_MODEL_DIR}/${f}"
            else
              echo "Already present: ${f}"
            fi
          done
          echo "=== Quality model directory ==="
          ls -lah "${QUALITY_MODEL_DIR}"

      - name: Set up Git identity
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "bot@github.actions"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Build live features (all models)
        run: |
          python bot/build_live_features.py

      - name: Run all model predictions
        run: |
          python bot/run_all_predictions.py

      - name: Validate model inputs
        run: |
          python bot/validate_model_inputs.py

      - name: Run price check + sell logic
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "21" ]; then
            python bot/decision_engine.py --endofday
          else
            python bot/decision_engine.py
          fi

      - name: Post-process tracker + PnL gain/loss
        run: |
          python bot/post_process_tracker.py

      - name: Commit and push latest outputs
        run: |
          git add bot/sell_alerts_tracker.json || true
          git add bot/PnL_gain_loss.json || true
          git add bot/live_results.csv || true
          git add bot/LLM_data/input_llm/llm_input_latest.csv || true
          git add bot/LLM_data/input_llm/llm_predictions.csv || true
          git add bot/LLM_data/input_llm/llm_predictions_all.csv || true
          git add bot/LLM_data/input_llm/model_input_validation.json || true
          git commit -m "🤖 Auto-update tracker + MT data [$(date -u '+%Y-%m-%d %H:%M:%S UTC')]" || echo "⚠️ Nothing to commit"
          git pull --rebase || true
          git push || true

  test-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run notify.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot/notify.py
